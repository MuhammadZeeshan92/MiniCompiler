<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Compiler IDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="highlight">{ }</span>
                Mini<span class="highlight">Compiler</span>
            </div>
            <button id="compileBtn" class="btn-compile">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Compile Code
            </button>
        </header>
        
        <main class="workspace">
            <section class="editor-section panel glass">
                <div class="panel-header">
                    <h3>Source Code</h3>
                    <div class="dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="codeEditor" spellcheck="false" placeholder="Enter your code here...&#10;e.g., x = 5 + 3 * (2 - 1)">x = 5 + 3 * (2 - 1)</textarea>
                </div>
            </section>
            
            <section class="output-section panel glass">
                <div class="panel-header">
                    <h3>Console Output</h3>
                    <div class="status-indicator" id="statusIndicator">Ready</div>
                </div>
                <div class="output-container" id="terminal">
                    <div class="welcome-msg">Waiting for compilation...</div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Mini Compiler - Abstract Syntax Tree Generator</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
